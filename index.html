
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEYGAP | COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #05070a; --panel: #0d1117; --border: #30363d; --accent: #2f81f7; }
        body, html { background: var(--bg); color: #e6edf3; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: #0d1117; }
        .logo { font-weight: 900; font-size: 18px; text-transform: uppercase; color: #fff; }
        .main-grid { height: calc(100vh - 50px); display: grid; grid-template-columns: 1fr 380px; gap: 10px; padding: 10px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background: #161b22; padding: 8px 12px; font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
<header>
    <div class="logo">KEYGAP <span>MASTER</span></div>
    <div id="clock" class="font-mono text-sm font-bold text-blue-400">00:00:00</div>
</header>
<div class="main-grid">
    <div class="card">
        <div class="card-header">S&P 500 Index & Analysis</div>
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=SPX&interval=5&theme=dark&style=1"></iframe>
    </div>

    <div class="card" style="display: grid; grid-template-rows: 1fr 1fr;">
        <div style="border-bottom: 1px solid #30363d; display: flex; flex-direction: column;">
            <div class="card-header">Economic Calendar</div>
            <iframe src="https://s.tradingview.com/embed-widget/events/?locale=it&colorTheme=dark"></iframe>
        </div>
        <div style="display: flex; flex-direction: column;">
            <div class="card-header">Market News</div>
            <iframe src="https://s.tradingview.com/embed-widget/timeline/?locale=it&colorTheme=dark"></iframe>
        </div>
    </div>
</div>
<script>
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);
</script>
</body>
</html>
